<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/card.css" />
    <title>Contact</title>
  </head>
  <body>
    <main>
      <!-- NAV -->
      <div class="container nav">
        <img src="./images/myteam2(2).svg" alt="logo" />

        <div class="href">
          <a class="nav-href" href="#">Home</a>
          <a class="nav-href" href="#">About</a>
        </div>

        <a class="contact-us" href="#">Contact us</a>
      </div>

      <!-- CONTENT -->
      <div class="container">
        <div class="salom">
          <!-- LEFT -->
          <div class="left">
            <h2>Contact</h2>
            <p>Ask us about</p>

            <div class="info">
              <div class="icon">🏆</div>
              <span>The quality of our talent network</span>
            </div>

            <div class="info">
              <div class="icon">⚙️</div>
              <span>Usage & implementation of our software</span>
            </div>

            <div class="info">
              <div class="icon">📊</div>
              <span>How we help drive innovation</span>
            </div>
          </div>

          <!-- RIGHT -->
          <div class="right">
            <input type="text" placeholder="Name" />
            <input type="email" placeholder="Email Address" />
            <input type="text" placeholder="Company Name" />
            <input type="text" placeholder="Title" />
            <textarea placeholder="Message"></textarea>
            <button>Submit</button>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <section class="bottom">
      <div class="container bottom-footer">
        <div style="display: flex">
          <div class="logo-icon">
            <img src="./images/myteam2(2).svg" alt="logo" />

            <div>
              <a class="nav-href" href="#">Home</a><br />
              <a class="nav-href" href="#">About</a>
            </div>
          </div>

          <div class="bottom_text">
            <p>
              987 Hillcrest Lane <br />
              Irvine, CA <br />
              California 92714 <br />
              Call Us : 949-833-7432
            </p>
          </div>
        </div>

        <div>
          <div class="bottom-href">
            <img src="./images/icon-facebook(1).svg" />
            <img src="./images/icon-pinterest.svg" />
            <img src="./images/icon-twitter.svg" />
          </div>

          <p class="href_bottom">Copyright 2020. All Rights Reserved</p>
        </div>
      </div>
    </section>
  </body>
</html>
